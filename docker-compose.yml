services:
  backend:
    build:
      context: ./backend
    container_name: userstoryllm-backend
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/storage/user_story_kb.db}
    volumes:
      - backend-storage:/app/storage
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: userstoryllm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  backend-storage: